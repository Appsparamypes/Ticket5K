<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impresión de Ticket</title>

    <!-- SDK de Epson ePOS -->
    <script src="epos-2.22.0.js"></script>

    <!-- Librería para convertir HTML a Canvas/Imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

 <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        /* Contenedor del recibo */
        #ticket {
            width: 80mm;
            background: #ffffff;
            padding: 6px 6px;
            box-sizing: border-box;
            color: #000000;
        }

        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .text-right { text-align: right; }

        .header-info {
            margin-bottom: 8px;
            font-size: 11px; /* Subió de 9px a 11px */
            line-height: 1.2;
        }

        .title-nota {
            font-size: 13px; /* Subió de 11px a 13px */
            font-weight: bold;
            margin: 6px 0;
        }

        .cliente-destacado {
            font-size: 14px; /* Subió de 12px a 14px */
            font-weight: bold;
            margin: 8px 0;
        }

        .fecha-info {
            font-size: 11px; /* Subió de 9px a 11px */
            font-weight: bold;
            margin-bottom: 8px;
        }

        /* Tabla de Detalle */
        .tabla-detalle {
            width: 100% !important;
            table-layout: fixed;
            border-collapse: collapse;
            margin: 8px 0;
            box-sizing: border-box;
        }

        .tabla-detalle th {
            background-color: #d0d0d0 !important;
            -webkit-print-color-adjust: exact;
            color: #000000;
            font-weight: bold;
            padding: 3px 1px;
            font-size: 9px; /* Subió de 7px a 9px */
        }

        .tabla-detalle td {
            padding: 3px 1px;
            font-size: 9px; /* Subió de 7px a 9px */
            vertical-align: middle;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* Distribución de columnas */
        .col-cant { width: 9%;  text-align: center; }
        .col-desc { width: 43%; text-align: left; }
        .col-um   { width: 14%; text-align: center; }
        .col-pu   { width: 17%; text-align: right; }
        .col-sub  { width: 17%; text-align: right; }

        /* Totales */
        .totales-container {
            width: 90%;
            margin-top: 10px;
            font-size: 13px; /* Subió de 11px a 13px */
            font-weight: bold;
        }

        .totales-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .metodo-pago {
            margin-top: 15px;
            font-size: 10px; /* Subió de 8px a 10px */
        }
    </style>
</head>
<body>

    <div id="ticket">
        <div class="header-info text-center">
            <div id="spn_empresa" style="font-weight: bold; font-size: 14px;"></div>
            <div>Telf: <span id="spn_whatsapp"></span></div>
            <div>Dirección: <span id="spn_direc"></span></div>
            
            <div class="title-nota">NOTA DE VENTA: <span id="spn_nro_boleta"></span></div>
            <div class="cliente-destacado">CLIENTE: <span id="spn_cliente"></span></div>
            <div class="fecha-info">Fecha: <span id="spn_fecha"></span></div>
        </div>

        <table class="tabla-detalle">
            <thead>
                <tr>
                    <th class="col-cant">Cant</th>
                    <th class="col-desc">Descripcion</th>
                    <th class="col-um">U.M.</th>
                    <th class="col-pu">P.U.</th>
                    <th class="col-sub">Subtotal</th>
                </tr>
            </thead>
            <tbody id="detalle_items">
                <!-- Se puebla dinámicamente desde los parámetros de URL -->
            </tbody>
        </table>

        <div class="totales-container">
            <div class="totales-row">
                <span>TOTAL:</span>
                <span id="spn_total"></span>
            </div>
            <div class="totales-row">
                <span>A CUENTA:</span>
                <span id="spn_a_cuenta"></span>
            </div>
            <div class="totales-row">
                <span>SALDO:</span>
                <span id="spn_saldo"></span>
            </div>
        </div>

        <div class="metodo-pago text-center">
            METODO DE PAGO: <span id="spn_forma"></span>
        </div>
    </div>

    <script>
        function cargarDatosDesdeURL() {
            // Capturar los parámetros enviados por AppSheet
            const params = new URLSearchParams(window.location.search);

            // Inyectar encabeza y totales
            document.getElementById("spn_nro_boleta").textContent = params.get("boleta") || "";
            document.getElementById("spn_fecha").textContent = params.get("fecha") || "";
            document.getElementById("spn_whatsapp").textContent = params.get("whatsapp") || "";
            document.getElementById("spn_empresa").textContent = params.get("nombre") || "";
            document.getElementById("spn_cliente").textContent = params.get("cliente") || "";
            document.getElementById("spn_direc").textContent = params.get("direccion") || "";
            document.getElementById("spn_forma").textContent = params.get("forma") || "";
            document.getElementById("spn_total").textContent = params.get("total") || "0";
            document.getElementById("spn_a_cuenta").textContent = params.get("a_cuenta") || "0";
            document.getElementById("spn_saldo").textContent = params.get("saldo") || "0";

            // Parsear las listas de detalles (separadas por comas desde AppSheet)
            const cantidades = (params.get("cantidades") || "").split(",");
            const servicios  = (params.get("servicios") || "").split(",");
            const umeds      = (params.get("umed") || "").split(",");
            const punits     = (params.get("punit") || "").split(",");
            const subtotales = (params.get("subtotal") || "").split(",");

            const tbody = document.getElementById("detalle_items");
            tbody.innerHTML = "";

            // Recorrer los ítems recibidos e insertar las filas
            if (servicios.length > 0 && servicios[0] !== "") {
                for (let i = 0; i < servicios.length; i++) {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td class="col-cant">${cantidades[i] ? cantidades[i].trim() : ''}</td>
                        <td class="col-desc">${servicios[i] ? decodeURIComponent(servicios[i]).trim() : ''}</td>
                        <td class="col-um">${umeds[i] ? decodeURIComponent(umeds[i]).trim() : '---'}</td>
                        <td class="col-pu">${punits[i] ? punits[i].trim() : ''}</td>
                        <td class="col-sub">${subtotales[i] ? subtotales[i].trim() : ''}</td>
                    `;
                    tbody.appendChild(tr);
                }
            }
        }

        // --- FUNCIÓN DE IMPRESIÓN VÍA IMAGE/CANVAS ---
        async function imprimirDirectoIpEpson() {
            const ticketElement = document.getElementById("ticket");

            if (!ticketElement) return;

            try {
                const canvas = await html2canvas(ticketElement, {
                    scale: 2,
                    useCORS: true,
                    logging: false
                });

                const ctx = canvas.getContext("2d");

                var builder = new epson.ePOSBuilder();
                builder.addTextLang('es');
                builder.addTextAlign(builder.ALIGN_CENTER);

                builder.addImage(ctx, 0, 0, canvas.width, canvas.height, builder.COLOR_1, builder.MODE_MONO);

                builder.addFeedUnit(30);
                builder.addCut(builder.CUT_FEED);

                var epos = new epson.ePOSPrint();
                var ipImpresora = "192.168.1.212";
                var address = `http://${ipImpresora}/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000`;

                epos.onreceive = function (res) {
                    if (res.success) {
                        console.log("¡Ticket impreso en alta calidad!");
                    } else {
                        alert("Error en la impresora. Código: " + res.code);
                    }
                };

                epos.onerror = function (err) {
                    console.error(err);
                    alert("No se pudo conectar con la Epson TM-m30III (192.168.1.212).");
                };

                epos.send(address, builder.toString());

            } catch (error) {
                console.error("Error al procesar la imagen del ticket:", error);
            }
        }

        window.addEventListener('load', () => {
            cargarDatosDesdeURL();
            setTimeout(imprimirDirectoIpEpson, 800);
        });
    </script>
</body>
</html>
