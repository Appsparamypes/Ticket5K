<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=80mm, initial-scale=1.0">
    <title>Nota de venta</title>
    <style>
        body {
            font-family: tahoma, Helvetica, sans-serif;
            margin: 0;
            font-size: 3mm;
            text-align: center;
        }
        #thermal-pos {
            margin: 0 auto;
            max-width: 60mm;
        }
        .label {
            margin: 0;
            margin-left: 0.5mm;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
        }
        .table-header h2 {
            margin: 0;
            padding-left: 0.5mm;
            font-size: 3.5mm;
        }
        .table-footer {
            margin-left: 0.5mm;
        }
        .table-footer h2, .table-footer h4 {
            margin: 0;
            padding: 1mm 0;
        }
        .saldo-text {
            margin: 0;
            margin-left: 0.1mm;
        }
        .policy {
            margin-left: 0.5mm;
        }
        .table-footer td {
            padding: 0;
            line-height: 1;
        }
        .nro_boleta, .nro_mesa, .fecha_recepcion, .info-tienda, .m-0, .direccion {
            margin: 0;
        }
    </style>
</head>
<body onload="window.print()" onfocus="window.close()">

    <script>
        // Obtener los parámetros de la URL
        const params = new URLSearchParams(window.location.search);

        // Obtener los valores de los parámetros
        var nombre_empresa = params.has('nombre_empresa') ? params.get('nombre_empresa') : "---";
        var whatsapp = params.has('whatsapp') ? params.get('whatsapp') : "---";
        var nro_boleta = params.has('boleta') ? params.get('boleta') : "---";
        var logo = params.has('logo') ? params.get('logo') : "";
        var direc = params.has('direccion') ? params.get('direccion') : "---";
        var client = params.has('cliente') ? params.get('cliente') : "---";
        var forma = params.has('forma') ? params.get('forma') : "---";
        var fecha = params.has('fecha') ? params.get('fecha') : "dd/mm/aaaa hh:mm:ss";
        var total = params.has('total') ? params.get('total') : "0";
        var saldo = params.has('saldo') ? params.get('saldo') : "0";
        var a_cuenta = params.has('a_cuenta') ? params.get('a_cuenta') : "0";
        
        var cantidades = params.has('cantidades') ? params.get('cantidades') : "0.00";
        var descripciones = params.has('servicios') ? params.get('servicios') : "No hay articulos";
        var subtotal = params.has('subtotal') ? params.get('subtotal') : "0.00";
        var umed = params.has('umed') ? params.get('umed') : "No unidad";
        var punit = params.has('punit') ? params.get('punit') : "No Precio";

        // Formato numérico seguro
        total = parseFloat(total).toLocaleString('es-ES', { minimumFractionDigits: 0 });
        a_cuenta = parseFloat(a_cuenta).toLocaleString('es-ES', { minimumFractionDigits: 0 });
        saldo = parseFloat(saldo).toLocaleString('es-ES', { minimumFractionDigits: 0 });
               
        // Corrección de variables singulares a sus splits correspondientes
        cantidades = cantidades.split(", ");
        descripciones = descripciones.split(", "); 
        var subtotalesList = subtotal.split(", ");
        var umedesList = umed.split(", ");
        var punitsList = punit.split(", ");

        var result = [];
        cantidades.forEach(function(value, id) {
            result[id] = {
                cantidad: cantidades[id],
                descripcion: descripciones[id],
                subtotal: parseFloat(subtotalesList[id] || 0).toLocaleString('es-ES', { minimumFractionDigits: 0 }),
                umed: umedesList[id] || "---", // Las unidades de medida no suelen ser float
                punit: parseFloat(punitsList[id] || 0).toLocaleString('es-ES', { minimumFractionDigits: 0 }),
            };
        });
    </script>

    <div id="thermal-pos">
        <div class="label">
            <p class="info-tienda">
                Telf: <span class="direccion" id="whatsapp"></span><br>
                Dirección: <span class="direccion" id="nro_direccion_id"></span>
            </p>
        </div>         
        <div class="label">
            <b>NOTA DE VENTA: <span class="nro_boleta" id="nro_boleta_id"></h1> </span>
            <h2>CLIENTE: <span class="direccion" id="cliente_id"></span></h2>            
        </div>
        
        <div class="label">
            <p class="fecha_entrega">
                <b>Fecha:<br><span id="fecha"></span></b>
            </p>
        </div>
   
        <table class="table">
            <tbody id="tablaBody">
                <tr class="table-header">
                    <th><h2>Cant</h2></th>
                    <th><h2>Descripcion</h2></th>
                    <th><h2>U.M.</h2></th>
                    <th><h2>P.U.</h2></th>
                    <th><h2>Subtotal</h2></th>
                </tr>
                <script>
                    var tablaBody = document.getElementById("tablaBody");

                    result.forEach(function(row) {
                        var newRow = document.createElement("tr");
                        newRow.className = "table-item";
                        newRow.innerHTML = `
                            <td class="item">${row.cantidad}</td>
                            <td class="item">${row.descripcion}</td>
                            <td class="item">${row.umed}</td>
                            <td class="item">${row.punit}</td>
                            <td class="item">${row.subtotal}</td>
                        `;
                        tablaBody.appendChild(newRow);
                    });

                    var spaceRow = document.createElement("tr");
                    spaceRow.innerHTML = '<td colspan="5">&nbsp;</td>';
                    tablaBody.appendChild(spaceRow);
                </script>
                
                <tr class="table-footer top-line">
                    <td colspan="3"><h2>TOTAL:</h2></td>
                    <td colspan="2"><h2 id="total"></h2></td>
                </tr>
                <tr class="table-footer">
                    <td colspan="3"><h2>A CUENTA:</h2></td>
                    <td colspan="2"><h2 id="a_cuenta"></h2></td>
                </tr>
                <tr class="table-footer">
                    <td colspan="3"><h2>SALDO:</h2></td>
                    <td colspan="2"><h2 id="saldo"></h2></td>
                </tr>
            </tbody>
        </table>
        <br/>
        <p class="saldo-text">
            <b><span class="estado-deuda" id="estado"></span></b>
        </p>
        <div class="policy">
            <p>METODO DE PAGO:</p>
            <h3 id="forma"></h3>
        </div>
    </div>

    <script>
        // Inserción segura de datos en el DOM
        document.getElementById("whatsapp").textContent = whatsapp;
        document.getElementById("nro_boleta_id").textContent = nro_boleta;
        document.getElementById("nro_direccion_id").textContent = direc;
        document.getElementById("cliente_id").textContent = client;
        document.getElementById("fecha").textContent = fecha;
        document.getElementById("total").textContent = total;
        document.getElementById("a_cuenta").textContent = a_cuenta;
        document.getElementById("saldo").textContent = saldo;
        document.getElementById("forma").textContent = forma;

        // Manejo seguro del Logo si viene en los parámetros
        if (logo) {
            var logoremplazado = logo.replace(/@/g,"&").replace(/ /g, "%20");
            var logoElement = document.getElementById("logoremplazado");
            if (logoElement) {
                logoElement.src = logoremplazado;
                logoElement.style.display = "block"; // Muestra la imagen si existe una URL
            }
        }
    </script>
</body>
</html>
