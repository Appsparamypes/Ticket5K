<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impresión de Ticket</title>

    <!-- SDK de Epson ePOS -->
    <script src="epos-2.22.0.js"></script>

    <!-- Librería para convertir HTML a Canvas/Imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        #ticket {
            width: 360px;
            background: #ffffff;
            padding: 15px;
            box-sizing: border-box;
            color: #000000;
        }

        .text-center { text-align: center; }
        .text-left { text-align: left; }
        .text-right { text-align: right; }

        .header-info {
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.3;
        }

        .title-nota {
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0;
        }

        .cliente-destacado {
            font-size: 20px;
            font-weight: bold;
            margin: 12px 0;
        }

        .fecha-info {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        /* Tabla de Detalle */
        .tabla-detalle {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }

        .tabla-detalle th {
            background-color: #d0d0d0 !important;
            -webkit-print-color-adjust: exact;
            color: #000000;
            font-weight: bold;
            padding: 6px 2px;
            font-size: 14px;
        }

        .tabla-detalle td {
            padding: 6px 2px;
            font-size: 14px;
            vertical-align: middle;
        }

        .col-cant { width: 10%; text-align: center; }
        .col-desc { width: 45%; text-align: left; }
        .col-um   { width: 15%; text-align: center; }
        .col-pu   { width: 15%; text-align: right; }
        .col-sub  { width: 15%; text-align: right; }

        .totales-container {
            width: 100%;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .totales-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .metodo-pago {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="ticket">
        <div class="header-info text-center">
            <div id="empresa_id" style="font-weight: bold; font-size: 16px;"></div>
            <div>Telf: <span id="whatsapp">71203914</span></div>
            <div>Dirección: <span id="nro_direccion_id">Villa Bolívar D Calle 131</span></div>
            
            <div class="title-nota">NOTA DE VENTA: <span id="nro_boleta_id">7</span></div>
            <div class="cliente-destacado">CLIENTE: <span id="cliente_id">Andres huacoto C.</span></div>
            <div class="fecha-info">Fecha: <span id="fecha">07/18/2026</span></div>
        </div>

        <table class="tabla-detalle">
            <thead>
                <tr>
                    <th class="col-cant">Cant</th>
                    <th class="col-desc">Descripcion</th>
                    <th class="col-um">U.M.</th>
                    <th class="col-pu">P.U.</th>
                    <th class="col-sub">Subtotal</th>
                </tr>
            </thead>
            <tbody id="detalle_items">
                <!-- Se puebla dinámicamente -->
            </tbody>
        </table>

        <div class="totales-container">
            <div class="totales-row">
                <span>TOTAL:</span>
                <span id="total">200</span>
            </div>
            <div class="totales-row">
                <span>A CUENTA:</span>
                <span id="a_cuenta">200</span>
            </div>
            <div class="totales-row">
                <span>SALDO:</span>
                <span id="saldo">0</span>
            </div>
        </div>

        <div class="metodo-pago text-center">
            METODO DE PAGO: <span id="forma">Efectivo</span>
        </div>
    </div>

    <script>
        function renderizarDatos() {
            // Asignación segura de campos si existen las variables globales de datos
            if (window.whatsappData !== undefined) document.getElementById("whatsapp").textContent = window.whatsappData;
            if (window.nro_boleta !== undefined) document.getElementById("nro_boleta_id").textContent = window.nro_boleta;
            if (window.direc !== undefined) document.getElementById("nro_direccion_id").textContent = window.direc;
            if (window.client !== undefined) document.getElementById("cliente_id").textContent = window.client;
            if (window.fecha !== undefined) document.getElementById("fecha").textContent = window.fecha;
            if (window.total !== undefined) document.getElementById("total").textContent = window.total;
            if (window.a_cuenta !== undefined) document.getElementById("a_cuenta").textContent = window.a_cuenta;
            if (window.saldo !== undefined) document.getElementById("saldo").textContent = window.saldo;
            if (window.forma !== undefined) document.getElementById("forma").textContent = window.forma;

            // Poblado de tabla
            const tbody = document.getElementById("detalle_items");
            tbody.innerHTML = "";

            // Datos de prueba fallback por si 'result' viene vacío
            const items = (typeof result !== 'undefined' && Array.isArray(result)) ? result : [
                { cantidad: 1, descripcion: "Grano de oro 12x1litro", umed: "CAJA", punit: 200, subtotal: 200 }
            ];

            items.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="col-cant">${row.cantidad}</td>
                    <td class="col-desc">${row.descripcion}</td>
                    <td class="col-um">${row.umed || '---'}</td>
                    <td class="col-pu">${row.punit}</td>
                    <td class="col-sub">${row.subtotal}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function imprimirDirectoIpEpson() {
            const ticketElement = document.getElementById("ticket");

            if (!ticketElement) {
                alert("No se encontró el diseño del ticket.");
                return;
            }

            try {
                const canvas = await html2canvas(ticketElement, {
                    scale: 2,
                    useCORS: true,
                    logging: false
                });

                const ctx = canvas.getContext("2d");

                var builder = new epson.ePOSBuilder();
                builder.addTextLang('es');
                builder.addTextAlign(builder.ALIGN_CENTER);

                builder.addImage(ctx, 0, 0, canvas.width, canvas.height, builder.COLOR_1, builder.MODE_MONO);

                builder.addFeedUnit(30);
                builder.addCut(builder.CUT_FEED);

                var epos = new epson.ePOSPrint();
                var ipImpresora = "192.168.1.212";
                var address = `http://${ipImpresora}/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000`;

                epos.onreceive = function (res) {
                    if (res.success) {
                        console.log("¡Ticket impreso en alta calidad!");
                    } else {
                        alert("Error en la impresora. Código: " + res.code);
                    }
                };

                epos.onerror = function (err) {
                    console.error(err);
                    alert("No se pudo conectar con la Epson TM-m30III (192.168.1.212).");
                };

                epos.send(address, builder.toString());

            } catch (error) {
                console.error("Error al procesar la imagen del ticket:", error);
            }
        }

        window.addEventListener('load', () => {
            renderizarDatos();
            setTimeout(imprimirDirectoIpEpson, 800);
        });
    </script>
</body>
</html>
