<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <script src="epos-2.22.0.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota de venta</title>
    <style>
        body {
            font-family: tahoma, Helvetica, sans-serif;
            margin: 0;
            font-size: 3mm;
            text-align: center;
            color: #333;
        }
        #thermal-pos {
            margin: 0 auto;
            max-width: 80mm;
        }
        .label {
            margin: 0;
            margin-left: 0.5mm;
        }
        .table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
        }
        .table-header th {
            margin: 0;
            padding: 1mm 0.5mm;
            font-size: 3.2mm;
            background-color: #d9d9d9 !important;
            font-weight: bold;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .table-item td {
            font-weight: normal !important;
            padding: 1mm 0.5mm;
            font-size: 3mm;
            text-align: left;
        }
        .item-num {
            text-align: right;
        }
        .table-footer {
            margin-left: 0.5mm;
        }
        .table-footer h2, .table-footer h4 {
            margin: 0;
            padding: 1mm 0;
        }
        .saldo-text {
            margin: 0;
            margin-left: 0.1mm;
        }
        .policy {
            margin-left: 0.5mm;
        }
        .table-footer td {
            padding: 0;
            line-height: 1;
        }
        .nro_boleta, .nro_mesa, .fecha_recepcion, .info-tienda, .m-0, .direccion {
            margin: 0;
        }
        .btn-imprimir {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <script>
        const params = new URLSearchParams(window.location.search);

        var nombre_empresa = params.has('nombre') ? params.get('nombre') : "---";
        var whatsapp = params.has('whatsapp') ? params.get('whatsapp') : "---";
        var nro_boleta = params.has('boleta') ? params.get('boleta') : "---";
        var logo = params.has('logo') ? params.get('logo') : "";
        var direc = params.has('direccion') ? params.get('direccion') : "---";
        var client = params.has('cliente') ? params.get('cliente') : "---";
        var forma = params.has('forma') ? params.get('forma') : "---";
        var fecha = params.has('fecha') ? params.get('fecha') : "dd/mm/aaaa hh:mm:ss";
        var total = params.has('total') ? params.get('total') : "0";
        var saldo = params.has('saldo') ? params.get('saldo') : "0";
        var a_cuenta = params.has('a_cuenta') ? params.get('a_cuenta') : "0";
        
        var cantidades = params.has('cantidades') ? params.get('cantidades') : "0.00";
        var descripciones = params.has('servicios') ? params.get('servicios') : "No hay articulos";
        var subtotal = params.has('subtotal') ? params.get('subtotal') : "0.00";
        var umed = params.has('umed') ? params.get('umed') : "No unidad";
        var punit = params.has('punit') ? params.get('punit') : "No Precio";

        var totalRaw = total;
        var aCuentaRaw = a_cuenta;
        var saldoRaw = saldo;

        total = parseFloat(total).toLocaleString('es-ES', { minimumFractionDigits: 0 });
        a_cuenta = parseFloat(a_cuenta).toLocaleString('es-ES', { minimumFractionDigits: 0 });
        saldo = parseFloat(saldo).toLocaleString('es-ES', { minimumFractionDigits: 0 });
               
        cantidades = cantidades.split(", ");
        descripciones = descripciones.split(", "); 
        var subtotalesList = subtotal.split(", ");
        var umedesList = umed.split(", ");
        var punitsList = punit.split(", ");

        var result = [];
        cantidades.forEach(function(value, id) {
            result[id] = {
                cantidad: cantidades[id],
                descripcion: descripciones[id],
                subtotal: parseFloat(subtotalesList[id] || 0).toLocaleString('es-ES', { minimumFractionDigits: 0 }),
                umed: umedesList[id] || "---", 
                punit: parseFloat(punitsList[id] || 0).toLocaleString('es-ES', { minimumFractionDigits: 0 }),
            };
        });
    </script>

    <div id="thermal-pos">
        <div class="label">
            <p class="info-tienda">
                Telf: <span class="direccion" id="whatsapp"></span><br>
                Dirección: <span class="direccion" id="nro_direccion_id"></span>
            </p>
        </div>          
        <div class="label">
            <b>NOTA DE VENTA: <span class="nro_boleta" id="nro_boleta_id"></span></b> 
            <h2>CLIENTE: <span class="direccion" id="cliente_id"></span></h2>            
        </div>
        
        <div class="label">
            <p class="fecha_entrega">
                <b>Fecha: <span id="fecha"></span></b>
            </p>
        </div>
   
        <table class="table">
            <tbody id="tablaBody">
                <tr class="table-header">
                    <th>Cant</th>
                    <th>Descripcion</th>
                    <th>U.M.</th>
                    <th>P.U.</th>
                    <th>Subtotal</th>
                </tr>
                <script>
                    var tablaBody = document.getElementById("tablaBody");

                    result.forEach(function(row) {
                        var newRow = document.createElement("tr");
                        newRow.className = "table-item";
                        newRow.innerHTML = `
                            <td class="item">${row.cantidad}</td>
                            <td class="item" style="text-align: left;">${row.descripcion}</td>
                            <td class="item">${row.umed}</td>
                            <td class="item item-num">${row.punit}</td>
                            <td class="item item-num">${row.subtotal}</td>
                        `;
                        tablaBody.appendChild(newRow);
                    });

                    var spaceRow = document.createElement("tr");
                    spaceRow.innerHTML = '<td colspan="5">&nbsp;</td>';
                    tablaBody.appendChild(spaceRow);
                </script>
                
                <tr class="table-footer top-line">
                    <td colspan="3"><h2>TOTAL:</h2></td>
                    <td colspan="2"><h2 id="total"></h2></td>
                </tr>
                <tr class="table-footer">
                    <td colspan="3"><h2>A CUENTA:</h2></td>
                    <td colspan="2"><h2 id="a_cuenta"></h2></td>
                </tr>
                <tr class="table-footer">
                    <td colspan="3"><h2>SALDO:</h2></td>
                    <td colspan="2"><h2 id="saldo"></h2></td>
                </tr>
            </tbody>
        </table>
        <br/>
        <p class="saldo-text">
            <b><span class="estado-deuda" id="estado"></span></b>
        </p>
        <div class="policy">
            <p>METODO DE PAGO: <span id="forma"></span></p>
        </div>

        <!-- Botón de impresión directo por LAN -->
        <button class="btn-imprimir" onclick="imprimirDirectoIpEpson()">🖨️ Imprimir Ticket (EPSON LAN)</button>
    </div>

    <script>
        document.getElementById("whatsapp").textContent = whatsapp;
        document.getElementById("nro_boleta_id").textContent = nro_boleta;
        document.getElementById("nro_direccion_id").textContent = direc;
        document.getElementById("cliente_id").textContent = client;
        document.getElementById("fecha").textContent = fecha;
        document.getElementById("total").textContent = total;
        document.getElementById("a_cuenta").textContent = a_cuenta;
        document.getElementById("saldo").textContent = saldo;
        document.getElementById("forma").textContent = forma;

        // Función para enviar XML ePOS a la Epson TM-m30III (IP: 192.168.1.212)
       function imprimirDirectoIpEpson() {
    // 1. Construir el documento con ePOS Builder
    var builder = new epson.ePOSBuilder();
    builder.addTextLang('es');
    builder.addTextSmooth(true);

    // Encabezado
    builder.addTextAlign(builder.ALIGN_CENTER);
    builder.addTextSize(2, 2);
    builder.addText(nombre_empresa.toUpperCase() + '\n');
    builder.addTextSize(1, 1);
    builder.addText("Telf: " + whatsapp + '\n');
    builder.addText("Dirección: " + direc + '\n');
    builder.addText("------------------------------------------\n");

    // Datos del cliente y boleta
    builder.addTextAlign(builder.ALIGN_LEFT);
    builder.addText("NOTA DE VENTA: " + nro_boleta + '\n');
    builder.addText("CLIENTE: " + client + '\n');
    builder.addText("FECHA: " + fecha + '\n');
    builder.addText("------------------------------------------\n");
    builder.addText("Cant   Descripción         P.U     Subt\n");
    builder.addText("------------------------------------------\n");

    // Detalle de ítems
    result.forEach(row => {
        let desc = row.descripcion.substring(0, 16).padEnd(16, ' ');
        builder.addText(`${row.cantidad}   ${desc}   ${row.punit}   ${row.subtotal}\n`);
    });

    // Totales y corte
    builder.addText("------------------------------------------\n");
    builder.addTextSize(2, 2);
    builder.addText("TOTAL: " + total + '\n');
    builder.addTextSize(1, 1);
    builder.addText("A CUENTA: " + a_cuenta + '\n');
    builder.addText("SALDO: " + saldo + '\n');
    builder.addText("MÉTODO DE PAGO: " + forma + '\n');
    
    builder.addFeedUnit(30);
    builder.addCut(builder.CUT_FEED);

    // 2. Enviar la orden a la impresora
    var epos = new epson.ePOSPrint();
    var ipImpresora = "192.168.1.212";
    var address = `http://${ipImpresora}/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000`;

    epos.onreceive = function (res) {
        if (res.success) {
            console.log("¡Ticket impreso correctamente!");
        } else {
            alert("Error en la impresora. Código: " + res.code);
        }
    };

    epos.onerror = function (err) {
        console.error(err);
        alert("No se pudo conectar con la Epson TM-m30III (192.168.1.212). Asegúrate de que el dispositivo esté en la misma red Wi-Fi.");
    };

    // Envío del comando generado
    epos.send(address, builder.toString());
}
</script>
</body>
</html>
